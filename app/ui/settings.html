<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ws: wss: http: https:;">
  <title>Chat Overlay Settings</title>
  <link rel="stylesheet" href="../../dist/output.css">
  <style>
    .titlebar { -webkit-app-region: drag; }
    .titlebar button { -webkit-app-region: no-drag; }
  </style>
</head>
<body class="bg-gray-900 text-white overflow-hidden">
  <div class="h-screen flex flex-col bg-black/60 backdrop-blur-md border border-white/10">
    <!-- Custom titlebar -->
    <div class="titlebar bg-black/40 border-b border-white/10 px-4 py-3 flex justify-between items-center">
      <span class="text-sm font-medium text-white/60">SETTINGS</span>
      <button id="closeBtn" aria-label="Close settings" class="text-white/40 hover:text-white/80 p-1">
        <i data-lucide="x" class="w-4 h-4" aria-hidden="true"></i>
      </button>
    </div>

    <div class="flex-1 p-6 overflow-y-auto">
      <div class="max-w-md mx-auto space-y-5">
        <!-- Username -->
        <div>
          <label class="block text-sm font-medium text-white/80 mb-2 flex items-center gap-2">
            <i data-lucide="user-round" class="w-4 h-4 text-white/40" aria-hidden="true"></i>
            Username
          </label>
          <input type="text" id="username" placeholder="Your username" 
            class="w-full px-3 py-2.5 bg-black/40 border border-white/10 text-white text-sm placeholder-white/30 outline-none focus:border-white/30" />
        </div>
        
        <!-- Server URL -->
        <div>
          <label class="block text-sm font-medium text-white/80 mb-2 flex items-center gap-2">
            <i data-lucide="server" class="w-4 h-4 text-white/40" aria-hidden="true"></i>
            Server URL
          </label>
          <input type="text" id="serverUrl" placeholder="ws://localhost:8000" 
            class="w-full px-3 py-2.5 bg-black/40 border border-white/10 text-white text-sm placeholder-white/30 outline-none focus:border-white/30" />
          <span class="text-xs text-white/40 mt-1 block">WebSocket server address</span>
        </div>
        
        <!-- Room ID -->
        <div>
          <label class="block text-sm font-medium text-white/80 mb-2 flex items-center gap-2">
            <i data-lucide="hash" class="w-4 h-4 text-white/40" aria-hidden="true"></i>
            Room ID
          </label>
          <input type="text" id="roomId" placeholder="my-room" 
            class="w-full px-3 py-2.5 bg-black/40 border border-white/10 text-white text-sm placeholder-white/30 outline-none focus:border-white/30" />
          <span class="text-xs text-white/40 mt-1 block">All users must use the same room ID</span>
        </div>
        
        <!-- Hotkey -->
        <div>
          <label class="block text-sm font-medium text-white/80 mb-2 flex items-center gap-2">
            <i data-lucide="keyboard" class="w-4 h-4 text-white/40" aria-hidden="true"></i>
            Toggle Hotkey
          </label>
          <input type="text" id="hotkey" placeholder="Press a key..." readonly
            class="w-full px-3 py-2.5 bg-black/40 border border-white/10 text-white text-sm placeholder-white/30 outline-none focus:border-white/30 cursor-pointer" />
          <span class="text-xs text-white/40 mt-1 block">Click and press any key combination</span>
        </div>
        
        <!-- Message timeout -->
        <div>
          <label class="block text-sm font-medium text-white/80 mb-2 flex items-center gap-2">
            <i data-lucide="timer" class="w-4 h-4 text-white/40" aria-hidden="true"></i>
            Message Timeout (seconds)
          </label>
          <input type="number" id="timeout" min="5" max="60" value="10"
            class="w-full px-3 py-2.5 bg-black/40 border border-white/10 text-white text-sm outline-none focus:border-white/30" />
        </div>

        <!-- Max Size -->
        <div class="space-y-4">
          <div>
            <div class="flex justify-between items-center mb-2">
              <label class="block text-sm font-medium text-white/80 flex items-center gap-2">
                <i data-lucide="stretch-vertical" class="w-4 h-4 text-white/40" aria-hidden="true"></i>
                Max Chat Height
              </label>
              <span id="maxHeightValue" class="text-xs text-white/40">400px</span>
            </div>
            <input type="range" id="maxHeight" min="100" max="800" value="400"
              class="w-full accent-white/20" />
          </div>
          <div>
            <div class="flex justify-between items-center mb-2">
              <label class="block text-sm font-medium text-white/80 flex items-center gap-2">
                <i data-lucide="stretch-horizontal" class="w-4 h-4 text-white/40" aria-hidden="true"></i>
                Max Chat Width
              </label>
              <span id="maxWidthValue" class="text-xs text-white/40">100%</span>
            </div>
            <input type="range" id="maxWidth" min="20" max="100" value="100"
              class="w-full accent-white/20" />
          </div>
        </div>
        
        <!-- Opacity -->
        <div>
          <label class="block text-sm font-medium text-white/80 mb-2 flex items-center gap-2">
            <i data-lucide="blend" class="w-4 h-4 text-white/40" aria-hidden="true"></i>
            Background Opacity
          </label>
          <input type="range" id="opacity" min="0" max="100" value="60"
            class="w-full accent-white/20" />
          <span id="opacityValue" class="text-xs text-white/40">60%</span>
        </div>
        
        <!-- Buttons -->
        <div class="flex flex-col gap-3 pt-4">
          <div class="flex gap-3">
            <button id="saveBtn" class="flex-1 px-6 py-2.5 bg-white/10 hover:bg-white/20 border border-white/20 text-white text-sm font-medium inline-flex items-center justify-center gap-2">
              <i data-lucide="save" class="w-4 h-4" aria-hidden="true"></i>
              <span>SAVE</span>
            </button>
            <button id="cancelBtn" class="flex-1 px-6 py-2.5 bg-white/5 hover:bg-white/10 border border-white/10 text-white/60 text-sm font-medium inline-flex items-center justify-center gap-2">
              <i data-lucide="ban" class="w-4 h-4" aria-hidden="true"></i>
              <span>CANCEL</span>
            </button>
          </div>
          <button id="resetPosBtn" class="w-full px-6 py-2 bg-red-500/10 hover:bg-red-500/20 border border-red-500/20 text-red-400 text-xs font-medium inline-flex items-center justify-center gap-2">
            <i data-lucide="locate-fixed" class="w-4 h-4" aria-hidden="true"></i>
            <span>RESET WINDOW POSITION</span>
          </button>
        </div>
        
        <!-- Setup Wizard Link -->
        <div class="pt-4 border-t border-white/10 mt-6">
          <button id="wizardBtn" class="text-sm text-white/40 hover:text-white/80 underline inline-flex items-center gap-2">
            <i data-lucide="sparkles" class="w-4 h-4" aria-hidden="true"></i>
            <span>Run Setup Wizard Again</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="../../node_modules/lucide/dist/umd/lucide.js"></script>
  <script src="./js/settings.js"></script>
</body>
</html>
